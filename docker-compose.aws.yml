# Production compose used on the EC2 host. Pulls images from ECR rather than
# building from source, uses the external RDS Postgres, and persists model
# artifacts to S3 instead of a local Docker volume.

name: transport-delay-predictor

x-app-env: &app-env
  env_file:
    - .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    <<: *app-env
    image: ${ECR_REGISTRY}/${ECR_API_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips=*
    ports:
      - "80:8000"
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model_data:/srv/models

  worker:
    <<: *app-env
    image: ${ECR_REGISTRY}/${ECR_WORKER_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model_data:/srv/models

  beat:
    <<: *app-env
    image: ${ECR_REGISTRY}/${ECR_WORKER_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redisdata:
  model_data:
