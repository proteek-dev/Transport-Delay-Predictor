name: transport-delay-predictor

x-app-env: &app-env
  env_file:
    - .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"

x-app-build: &app-build
  context: .
  dockerfile: docker/api.Dockerfile

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    # Postgres credentials are sourced exclusively from .env so no literal
    # password ever lands in version control (GitGuardian flags compose defaults
    # like `${POSTGRES_PASSWORD:-...}` as hardcoded secrets). `make env` seeds
    # .env from .env.example on first run.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    <<: *app-env
    build: *app-build
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips=*
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/srv/app:ro
      - ./alembic:/srv/alembic:ro
      - ./alembic.ini:/srv/alembic.ini:ro
      - ./tests:/srv/tests:ro

  worker:
    <<: *app-env
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/srv/app:ro
      - model_data:/srv/models

  beat:
    <<: *app-env
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/srv/app:ro

volumes:
  pgdata:
  redisdata:
  model_data:
