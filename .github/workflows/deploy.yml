name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC -> AWS

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: transport-delay-predictor

jobs:
  build-and-push:
    name: Build + push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/api:${{ steps.meta.outputs.image_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build + push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/worker:${{ steps.meta.outputs.image_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deploy on EC2
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          REGISTRY=$(aws sts get-caller-identity --query 'Account' --output text).dkr.ecr.${AWS_REGION}.amazonaws.com

          # SSM AWS-RunShellScript runs each array element in its own subshell,
          # so `export` lines split across elements get lost before the script
          # reads them. Build the full deploy as a single multiline shell string
          # and submit it as ONE element so every export is in scope when
          # /opt/.../deploy.sh runs.
          DEPLOY_CMD="export AWS_REGION=${AWS_REGION}
          export ECR_REGISTRY=${REGISTRY}
          export ECR_API_REPO=${PROJECT_NAME}/api
          export ECR_WORKER_REPO=${PROJECT_NAME}/worker
          export IMAGE_TAG=${IMAGE_TAG}
          export PROJECT_NAME=${PROJECT_NAME}
          bash /opt/${PROJECT_NAME}/infra/scripts/deploy.sh"

          # jq does the JSON-escaping so newlines / quotes / commas in
          # $DEPLOY_CMD don't break AWS CLI's shorthand parser. Bash-quoting
          # `commands=["$DEPLOY_CMD"]` directly drops the inner quotes during
          # word splitting and the shorthand parser then rejects it.
          PARAMS=$(jq -nc --arg cmd "$DEPLOY_CMD" '{commands: [$cmd]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE_TAG}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)

          echo "SSM command ID: $CMD_ID"

          # Poll until the command finishes; surface stdout/stderr on failure.
          STATUS=InProgress
          while [ "$STATUS" = "Pending" ] || [ "$STATUS" = "InProgress" ]; do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text)
            echo "  ... $STATUS"
          done

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
            exit 1
          fi
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
